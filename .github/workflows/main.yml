name: CI

on: [push, workflow_dispatch]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Download
      run: wget https://cloudron.io/cloudron-setup 
    - name: Changing Permissions
      run: chmod +x ./cloudron-setup
    - name: Uninstalling nginx
      run: sudo apt purge nginx nginx-common nginx-core
    - name: Uninstalling docker (1/2)
      run: sudo apt-get purge -y docker docker.io
    - name: Uninstalling docker (2/2)
      run: sudo apt-get autoremove -y --purge docker docker.io
    - name: Uninstalling nodejs
      run: sudo apt-get purge nodejs
    - name: Installing
      run: sudo ./cloudron-setup --provider generic
