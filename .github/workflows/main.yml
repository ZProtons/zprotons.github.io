name: CI

on: [push, workflow_dispatch]

jobs:
  build:

    runs-on: ubuntu-18.04

    steps:
    - name: Finding nodejs (1/3)
      run: which node
    - name: Finding nodejs (2/3)
      run: find $(echo $PATH | sed 's/:/ /g') -name "node"
    - name: Finding nodejs (3/3)
      run: find / -name "node"
    - name: Download
      run: wget https://cloudron.io/cloudron-setup
    - name: Changing Permissions
      run: chmod +x ./cloudron-setup
    - name: Removing nginx (1/2)
      run: sudo apt-get remove nginx nginx-common
    - name: Removing nginx (2/2)
      run: sudo apt-get purge nginx nginx-common
    - name: Removing nginx (3/2)
      run: sudo apt-get autoremove
    - name: Remove Docker (1/2)
      run: sudo snap remove --purge docker
    - name: Remove Docker (2/2)
      run: sudo find / -name "*docker*" -exec `rm -rf` {} +  
    - name: Installing
      run: sudo ./cloudron-setup
