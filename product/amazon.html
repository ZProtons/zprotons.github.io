<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Product Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.core.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.theme.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/micromodal/dist/micromodal.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/default-skin/default-skin.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drift-zoom/dist/drift-basic.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/malihu-custom-scrollbar-plugin/3.1.5/jquery.mCustomScrollbar.min.css">
  <link rel="stylesheet" href="amazon.css">
</head>
<body>
  <header>
    <nav>
      <!-- Navigation menu goes here -->
    </nav>
  </header>

  <main>
    <div class="container mx-auto">
      <div class="flex flex-wrap my-10">
        <div class="w-full lg:w-1/2">
          <div class="product-gallery">
            <div class="slider">
              <div class="glide__track" data-glide-el="track">
                <ul class="glide__slides">
                  <li class="glide__slide">
                    <img src="https://via.placeholder.com/600" alt="Product Image">
                  </li>
                  <li class="glide__slide">
                    <img src="https://via.placeholder.com/600" alt="Product Image">
                  </li>
                  <li class="glide__slide">
                    <img src="https://via.placeholder.com/600" alt="Product Image">
                  </li>
                </ul>
              </div>
            </div>

            <div class="thumbnail-gallery mt-4">
              <div class="thumbnail-item">
                <img src="https://via.placeholder.com/150" alt="Product Image">
              </div>
              <div class="thumbnail-item">
                <img src="https://via.placeholder.com/150" alt="Product Image">
              </div>
              <div class="thumbnail-item">
                <img src="https://via.placeholder.com/150" alt="Product Image">
              </div>
            </div>
          </div>
        </div>
        
        <div class="w-full lg:w-1/2">
          <div class="product-info pl-6">
            <h2 class="text-2xl font-semibold">Buy from Amazon</h2>
            <p class="text-lg text-gray-600">Product Description</p>
            <div class="rating mt-4">
              <i class="fas fa-star text-yellow-500"></i>
              <i class="fas fa-star text-yellow-500"></i>
              <i class="fas fa-star text-yellow-500"></i>
              <i class="fas fa-star text-yellow-500"></i>
              <i class="fas fa-star-half-alt text-yellow-500"></i>
            </div>
            <p class="text-2xl text-red-500 font-bold mt-4">$99.99</p>
            
            <div class="mt-6">
              <input type="text" class="border border-gray-300 rounded px-4 py-2 w-full" placeholder="Amazon Product URL">
            </div>
            
            <button class="btn mt-6">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/@glidejs/glide/3.4.1/glide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/micromodal/dist/micromodal.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe-ui-default.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/drift-zoom/dist/Drift.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/malihu-custom-scrollbar-plugin/3.1.5/jquery.mCustomScrollbar.concat.min.js"></script>
  <script src="amazon.js"></script>
</body>
</html>
