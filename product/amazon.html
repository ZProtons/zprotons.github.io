<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
  <link rel="stylesheet" href="amazon.css">
</head>
<body>
  <header>
    <!-- Header content goes here -->
  </header>

  <main>
    <div class="product-page">
      <div class="product-image">
        <img src="product-image.jpg" alt="Product Image">
      </div>
      <div class="product-details">
        <h1 class="product-title">Product Title</h1>
        <p class="product-price">$99.99</p>
        <p class="product-description">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        <div class="add-to-cart">
          <button class="buy-button">Buy Now</button>
          <input type="text" class="product-url" placeholder="Enter Product URL">
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
