<!DOCTYPE html>
<html>
<head>
  <title>Shipping Service</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <header class="bg-primary text-white py-4">
    <div class="container text-center">
      <h1 class="text-3xl">Welcome to our Shipping Service</h1>
    </div>
  </header>
  
  <section class="py-5">
    <div class="container">
      <h2 class="text-2xl mb-4">Place an Order</h2>
      <form id="order-form" class="max-w-md mx-auto">
        <div class="mb-4">
          <label for="product-url" class="text-lg">Product URL:</label>
          <input type="url" class="form-input mt-1 block w-full" id="product-url" name="product-url" required>
          <small class="text-red-500 text-sm hidden" id="url-error">Please enter a valid URL.</small>
        </div>
      
        <div class="mb-4">
          <label for="quantity" class="text-lg">Quantity:</label>
          <input type="number" class="form-input mt-1 block w-full" id="quantity" name="quantity" required>
        </div>
      
        <div class="mb-4">
          <label for="shipping-address" class="text-lg">Shipping Address:</label>
          <textarea class="form-textarea mt-1 block w-full" id="shipping-address" name="shipping-address" required></textarea>
          <small class="text-red-500 text-sm hidden" id="address-error">Please enter a valid address.</small>
        </div>

        <div class="mb-4">
          <label for="contact-number" class="text-lg">Contact Phone Number:</label>
          <input type="tel" class="form-input mt-1 block w-full" id="contact-number" name="contact-number" required>
        </div>
      
        <div class="flex justify-center">
          <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
            Place Order
          </button>
        </div>
      </form>
      
      <div id="order-success" class="hidden text-center mt-8">
        <h3 class="text-2xl text-green-500 mb-4">Order Placed Successfully!</h3>
        <p class="mb-4">Your order has been submitted, and our volunteer will be in touch with you shortly.</p>
        <button id="back-button" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded">Back</button>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.emailjs.com/sdk/2.6.4/email.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
