<!DOCTYPE html>
<html>
<head>
  <title>Shipping Service</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <header class="bg-primary text-white py-4">
    <div class="container text-center">
      <h1>Welcome to our Shipping Service</h1>
    </div>
  </header>
  
  <section class="py-5">
    <div class="container">
      <h2 class="mb-4">Place an Order</h2>
      <form id="order-form">
        <div class="form-group">
          <label for="product-url">Product URL:</label>
          <input type="url" class="form-control" id="product-url" name="product-url" required>
          <small class="form-text text-danger d-none" id="url-error">Please enter a valid URL.</small>
        </div>
      
        <div class="form-group">
          <label for="quantity">Quantity:</label>
          <input type="number" class="form-control" id="quantity" name="quantity" required>
        </div>
      
        <div class="form-group">
          <label for="shipping-address">Shipping Address:</label>
          <textarea class="form-control" id="shipping-address" name="shipping-address" required></textarea>
          <small class="form-text text-danger d-none" id="address-error">Please enter a valid address.</small>
        </div>
        
        <div class="form-group">
          <label for="contact-phone">Contact Phone Number:</label>
          <input type="tel" class="form-control" id="contact-phone" name="contact-phone" required>
        </div>
        
        <div class="form-group">
          <label for="product-image">Product Image:</label>
          <div class="image-preview"></div>
        </div>
      
        <div class="form-group text-center">
          <button type="submit" class="btn btn-success">Place Order</button>
        </div>
      </form>
      
      <div id="order-success" class="d-none text-center">
        <h3 class="text-success mb-3">Order Placed Successfully!</h3>
        <p>Your order has been submitted, and our volunteer will be in touch with you shortly.</p>
        <button id="back-button" class="btn btn-secondary">Back</button>
      </div>
    </div>
  </section>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
  <script src="script.js"></script>
</body>
</html>
